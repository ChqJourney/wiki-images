<svg viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a1-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563EB"/>
    </marker>
    <marker id="a1-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#DC2626"/>
    </marker>
    <marker id="a1-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16A34A"/>
    </marker>
    <marker id="a1-gray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="680" height="400" rx="12" fill="#F8FAFC"/>

  <!-- 标题 -->
  <text x="340" y="28" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="18" font-weight="bold" fill="#1E293B">保护性接地 — 故障电流路径</text>

  <!-- ===== 第一行：三个事件框 ===== -->

  <!-- 框1：绝缘失效 -->
  <rect x="40" y="55" width="150" height="65" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="115" y="82" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#991B1B">⚠ 绝缘失效</text>
  <text x="115" y="103" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="11.5" fill="#991B1B">带电体接触金属外壳</text>

  <!-- 箭头 1→2 -->
  <line x1="190" y1="88" x2="240" y2="88" stroke="#DC2626" stroke-width="2" marker-end="url(#a1-red)"/>

  <!-- 框2：金属外壳带电 -->
  <rect x="245" y="55" width="150" height="65" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="320" y="82" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#991B1B">金属外壳带电</text>
  <text x="320" y="103" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="11.5" fill="#991B1B">危险电压存在</text>

  <!-- 箭头 2→3 -->
  <line x1="395" y1="88" x2="445" y2="88" stroke="#16A34A" stroke-width="2" marker-end="url(#a1-green)"/>

  <!-- 框3：低阻抗接地路径 -->
  <rect x="450" y="55" width="170" height="65" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="535" y="82" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534">低阻抗接地路径</text>
  <text x="535" y="103" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="11.5" fill="#166534">R ≤ 0.1 Ω + Rcord</text>

  <!-- ===== 分支：从框3右下角向下 ===== -->
  <line x1="535" y1="120" x2="535" y2="160" stroke="#16A34A" stroke-width="2"/>
  <line x1="535" y1="160" x2="460" y2="160" stroke="#16A34A" stroke-width="2" marker-end="url(#a1-green)"/>

  <!-- ===== 第二行：故障电流 → 保护跳闸 ===== -->

  <!-- 框4：大故障电流 -->
  <rect x="320" y="170" width="150" height="55" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="395" y="196" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E40AF">大故障电流</text>
  <text x="395" y="215" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#1E40AF">I_fault = V / R_earth</text>

  <!-- 箭头 4→5 -->
  <line x1="470" y1="198" x2="535" y2="198" stroke="#2563EB" stroke-width="2" marker-end="url(#a1-blue)"/>

  <!-- 框5：保护装置跳闸 -->
  <rect x="540" y="170" width="120" height="55" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="600" y="196" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#1E40AF">保护装置跳闸</text>
  <text x="600" y="215" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#1E40AF">断路器 / 熔断器</text>

  <!-- ===== 第三行：最终结果 ===== -->

  <!-- 从框5向下到结果 -->
  <line x1="600" y1="225" x2="600" y2="275" stroke="#16A34A" stroke-width="2"/>
  <line x1="600" y1="275" x2="530" y2="275" stroke="#16A34A" stroke-width="2" marker-end="url(#a1-green)"/>

  <!-- 标签：接地良好路径 -->
  <text x="615" y="255" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#16A34A" font-weight="bold">良好</text>

  <!-- 结果框：安全 -->
  <rect x="390" y="290" width="150" height="60" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="465" y="316" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#166534">✅ 安全：外壳断电</text>
  <text x="465" y="338" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#166534">用户免受电击</text>

  <!-- ===== 不良接地分支（左侧虚线路径） ===== -->

  <!-- 从框1底部出发的虚线 -->
  <line x1="115" y1="120" x2="115" y2="320" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- 箭头：不良接地方向 -->
  <line x1="115" y1="320" x2="175" y2="320" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#a1-red)"/>

  <!-- 标签 -->
  <text x="128" y="220" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#DC2626" font-weight="bold">若接地</text>
  <text x="128" y="238" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="12" fill="#DC2626" font-weight="bold">不良 ↘</text>

  <!-- 结果框：危险 -->
  <rect x="180" y="295" width="160" height="50" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="260" y="318" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="bold" fill="#991B1B">❌ 外壳持续带电！</text>
  <text x="260" y="336" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#991B1B">致命危险</text>

  <!-- ===== 接地路径标签 ===== -->
  <!-- 在第二行底部添加一个场景说明条 -->
  <rect x="40" y="370" width="600" height="22" rx="4" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="340" y="385" text-anchor="middle" font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif" font-size="11" fill="#64748B">关键结论：接地电阻越低，故障电流越大，保护装置动作越快 — IEC 60335-1 设定 R ≤ 0.1Ω + Rcord 上限确保安全</text>

</svg>
