<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563"/>
    </marker>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="ng" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <rect x="235" y="10" width="250" height="46" rx="23" fill="url(#hdr)"/>
  <text x="360" y="38" text-anchor="middle" fill="white" font-weight="bold" font-size="14">零件是否承担绝缘/外壳功能？</text>

  <line x1="360" y1="56" x2="360" y2="78" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="495" y="72" fill="#059669" font-weight="bold" font-size="12">否 → 不考核</text>

  <rect x="195" y="80" width="330" height="44" rx="12" fill="#f0f9ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="360" y="100" text-anchor="middle" fill="#1e40af" font-weight="bold" font-size="13">是否属于豁免情形？</text>
  <text x="360" y="116" text-anchor="middle" fill="#6b7280" font-size="11">（已认证组件 / 小零件 / 薄纤维）</text>
  <line x1="195" y1="102" x2="80" y2="102" stroke="#4b5563" stroke-width="2"/>
  <rect x="10" y="88" width="70" height="28" rx="8" fill="url(#ok)"/>
  <text x="45" y="107" text-anchor="middle" fill="white" font-weight="bold" font-size="11">豁免</text>

  <line x1="360" y1="124" x2="360" y2="150" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="40" y="155" width="195" height="72" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="137" y="180" text-anchor="middle" fill="#92400e" font-weight="bold" font-size="13">🔥 阻燃性能</text>
  <text x="137" y="198" text-anchor="middle" fill="#a16207" font-size="11">火焰等级 ≥ HB</text>
  <text x="137" y="216" text-anchor="middle" fill="#a16207" font-size="11">（按最薄壁厚评定）</text>

  <rect x="262" y="155" width="195" height="72" rx="10" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="360" y="180" text-anchor="middle" fill="#9d174d" font-weight="bold" font-size="13">⚡ 电气性能</text>
  <text x="360" y="198" text-anchor="middle" fill="#be185d" font-size="11">CTI + HWI + HAI</text>
  <text x="360" y="216" text-anchor="middle" fill="#be185d" font-size="11">三项全部达标</text>

  <rect x="485" y="155" width="195" height="72" rx="10" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="582" y="180" text-anchor="middle" fill="#166534" font-weight="bold" font-size="13">🌡️ 热老化性能</text>
  <text x="582" y="198" text-anchor="middle" fill="#15803d" font-size="11">RTI ≥ 60°C</text>
  <text x="582" y="216" text-anchor="middle" fill="#15803d" font-size="11">（电气 + 机械）</text>

  <line x1="137" y1="227" x2="137" y2="265" stroke="#4b5563" stroke-width="2"/>
  <line x1="360" y1="227" x2="360" y2="265" stroke="#4b5563" stroke-width="2"/>
  <line x1="582" y1="227" x2="582" y2="265" stroke="#4b5563" stroke-width="2"/>
  <line x1="137" y1="265" x2="582" y2="265" stroke="#4b5563" stroke-width="2"/>
  <line x1="360" y1="265" x2="360" y2="292" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="250" y="295" width="220" height="42" rx="12" fill="#f0f9ff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="360" y="321" text-anchor="middle" fill="#1e40af" font-weight="bold" font-size="14">三项全部满足？</text>

  <line x1="470" y1="316" x2="560" y2="316" stroke="#dc2626" stroke-width="2"/>
  <rect x="562" y="301" width="130" height="30" rx="8" fill="url(#ng)"/>
  <text x="627" y="321" text-anchor="middle" fill="white" font-weight="bold" font-size="12">❌ 更换材料</text>

  <line x1="360" y1="337" x2="360" y2="362" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="535" y="355" fill="#059669" font-weight="bold" font-size="12">是</text>

  <rect x="195" y="365" width="330" height="58" rx="10" fill="#eff6ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="388" text-anchor="middle" fill="#3730a3" font-weight="bold" font-size="13">附加检查</text>
  <text x="360" y="405" text-anchor="middle" fill="#4c1d95" font-size="11">聚合物制程（UL 746D）+ 禁用硬橡胶 + 密封胶合规</text>

  <line x1="360" y1="423" x2="360" y2="450" stroke="#4b5563" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="235" y="452" width="250" height="46" rx="23" fill="url(#ok)"/>
  <text x="360" y="480" text-anchor="middle" fill="white" font-weight="bold" font-size="15">✅ 绝缘材料选型合格</text>
</svg>