<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="700" height="280" rx="14" fill="#f8fafc"/>
  <text x="350" y="30" text-anchor="middle" fill="#0f172a" font-weight="bold" font-size="16">三元电气性能体系</text>
  <text x="350" y="50" text-anchor="middle" fill="#64748b" font-size="12">每个参数回答一个不同的安全问题</text>

  <!-- CTI Card -->
  <rect x="20" y="65" width="210" height="195" rx="12" fill="white" filter="url(#shadow)" stroke="#3b82f6" stroke-width="1"/>
  <rect x="20" y="65" width="210" height="42" rx="12" fill="#3b82f6"/>
  <rect x="20" y="95" width="210" height="12" fill="#3b82f6"/>
  <text x="125" y="92" text-anchor="middle" fill="white" font-weight="bold" font-size="15">🔍 CTI</text>
  <text x="125" y="122" text-anchor="middle" fill="#1e40af" font-weight="bold" font-size="13">相比漏电起痕指数</text>
  <text x="125" y="145" text-anchor="middle" fill="#4b5563" font-size="11">门槛：≥ 175V</text>
  <text x="125" y="165" text-anchor="middle" fill="#4b5563" font-size="11">或 PLC ≥ 3</text>
  <line x1="40" y1="178" x2="210" y2="178" stroke="#e2e8f0" stroke-width="1"/>
  <text x="125" y="198" text-anchor="middle" fill="#64748b" font-size="10">回答：材料表面受污染潮湿后</text>
  <text x="125" y="214" text-anchor="middle" fill="#64748b" font-size="10">会不会形成碳化导通路径？</text>
  <text x="125" y="236" text-anchor="middle" fill="#64748b" font-size="10">关注场景：高湿、盐雾环境</text>
  <text x="125" y="252" text-anchor="middle" fill="#64748b" font-size="10">户外、厨房、浴室</text>

  <!-- HWI Card -->
  <rect x="245" y="65" width="210" height="195" rx="12" fill="white" filter="url(#shadow)" stroke="#f59e0b" stroke-width="1"/>
  <rect x="245" y="65" width="210" height="42" rx="12" fill="#f59e0b"/>
  <rect x="245" y="95" width="210" height="12" fill="#f59e0b"/>
  <text x="350" y="92" text-anchor="middle" fill="white" font-weight="bold" font-size="15">🔥 HWI</text>
  <text x="350" y="122" text-anchor="middle" fill="#92400e" font-weight="bold" font-size="13">热丝引燃指数</text>
  <text x="350" y="145" text-anchor="middle" fill="#4b5563" font-size="11">门槛：由阻燃等级决定</text>
  <text x="350" y="165" text-anchor="middle" fill="#4b5563" font-size="11">（详见联动表）</text>
  <line x1="265" y1="178" x2="435" y2="178" stroke="#e2e8f0" stroke-width="1"/>
  <text x="350" y="198" text-anchor="middle" fill="#64748b" font-size="10">回答：过载发热时</text>
  <text x="350" y="214" text-anchor="middle" fill="#64748b" font-size="10">绝缘会不会先烧起来？</text>
  <text x="350" y="236" text-anchor="middle" fill="#64748b" font-size="10">关注场景：端子松动发热</text>
  <text x="350" y="252" text-anchor="middle" fill="#64748b" font-size="10">接线不良、过流短路</text>

  <!-- HAI Card -->
  <rect x="470" y="65" width="210" height="195" rx="12" fill="white" filter="url(#shadow)" stroke="#ef4444" stroke-width="1"/>
  <rect x="470" y="65" width="210" height="42" rx="12" fill="#ef4444"/>
  <rect x="470" y="95" width="210" height="12" fill="#ef4444"/>
  <text x="575" y="92" text-anchor="middle" fill="white" font-weight="bold" font-size="15">⚡ HAI</text>
  <text x="575" y="122" text-anchor="middle" fill="#991b1b" font-weight="bold" font-size="13">高电流电弧引燃</text>
  <text x="575" y="145" text-anchor="middle" fill="#4b5563" font-size="11">门槛：由阻燃等级决定</text>
  <text x="575" y="165" text-anchor="middle" fill="#4b5563" font-size="11">（详见联动表）</text>
  <line x1="490" y1="178" x2="660" y2="178" stroke="#e2e8f0" stroke-width="1"/>
  <text x="575" y="198" text-anchor="middle" fill="#64748b" font-size="10">回答：插拔打火时</text>
  <text x="575" y="214" text-anchor="middle" fill="#64748b" font-size="10">绝缘会不会被点燃？</text>
  <text x="575" y="236" text-anchor="middle" fill="#64748b" font-size="10">关注场景：频繁插拔</text>
  <text x="575" y="252" text-anchor="middle" fill="#64748b" font-size="10">带电拔插、触头烧蚀</text>

  <!-- Connecting labels -->
  <text x="350" y="278" text-anchor="middle" fill="#94a3b8" font-size="10">三个参数缺一不可，共同构成绝缘材料的安全边界</text>
</svg>